<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yeahtask</title>
  <link rel="shortcut icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="yeahtask">
  <!-- Modern Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark Mode Color Palette (Slate) */
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --header-bg: rgba(15, 23, 42, 0.85);
      --board-bg: rgba(30, 41, 59, 0.85);
      --text-main: #f8fafc; /* Slate 50 */
      --text-light: #94a3b8; /* Slate 400 */
      --card-bg: #334155; /* Slate 700 */
      --primary: #3b82f6; /* Blue 500 */
      --primary-hover: #60a5fa; /* Blue 400 */
      --danger-bg: rgba(220, 38, 38, 0.2);
      --danger-text: #fca5a5;
      --danger-hover: rgba(220, 38, 38, 0.35);
      
      /* Darker Shadows & Radii */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * { 
      box-sizing: border-box; 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Header & Navigation */
    header {
      background-color: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .board-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    select, button {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
    }

    select {
      background-color: #334155;
      border-color: #475569;
      color: var(--text-main);
    }
    select:focus { border-color: var(--primary); }

    header button {
      background-color: #334155;
      color: var(--text-main);
      border-color: #475569;
    }

    header button:hover { background-color: #475569; }
    
    .danger-btn { 
      background-color: var(--danger-bg) !important; 
      color: var(--danger-text) !important; 
      border-color: var(--danger-bg) !important;
    }
    .danger-btn:hover { background-color: var(--danger-hover) !important; }

    /* Board Area */
    .board-container {
      flex: 1;
      padding: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    /* Columns */
    .column {
      background-color: var(--board-bg);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-width: 300px;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
      box-shadow: var(--shadow-sm);
    }

    .column-header {
      padding: 16px 16px 12px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-col {
      cursor: pointer;
      color: #64748b;
      font-size: 18px;
      transition: color 0.2s;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    .delete-col:hover { color: var(--danger-text); background-color: var(--danger-bg); }

    /* Task Cards */
    .task-list {
      padding: 0 12px;
      margin: 0;
      overflow-y: auto;
      flex: 1;
      min-height: 40px;
    }

    .task-card {
      background-color: var(--card-bg);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 14px;
      margin-bottom: 12px;
      cursor: grab;
      word-wrap: break-word;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.5;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .task-card:active { cursor: grabbing; transform: translateY(0); box-shadow: var(--shadow-sm); }
    .task-card.dragging { opacity: 0.4; border: 1px dashed var(--primary); }

    .delete-task {
      cursor: pointer;
      color: #64748b;
      font-size: 16px;
      margin-left: 10px;
      transition: color 0.2s;
    }
    .delete-task:hover { color: var(--danger-text); }

    /* Add Buttons */
    .add-task-btn {
      padding: 14px;
      margin: 0 12px 12px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .add-task-btn:hover { background-color: rgba(255, 255, 255, 0.05); color: var(--text-main); }

    .add-column-btn {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      min-width: 300px;
      padding: 16px;
      border-radius: var(--radius-lg);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-column-btn:hover { 
      background-color: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: var(--shadow-sm);
    }

    /* Utility */
    .hidden { display: none !important; }

    /* Custom Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 15vh;
      z-index: 1000;
      opacity: 0;
      animation: fadeIn 0.2s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .modal-box {
      background-color: #1e293b; /* Slate 800 */
      width: 380px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(-20px);
      animation: slideDown 0.2s ease-out forwards;
    }

    @keyframes slideDown { to { transform: translateY(0); } }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      color: var(--text-main);
    }

    .modal-message {
      font-size: 14px;
      color: var(--text-light);
      margin: 0;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      padding: 10px 14px;
      background-color: #0f172a; /* Slate 900 */
      color: var(--text-main);
      border: 1px solid #475569;
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .modal-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-btn-confirm { background-color: var(--primary); color: white; border: none; }
    .modal-btn-confirm:hover { background-color: var(--primary-hover); }
    
    .modal-btn-cancel { background-color: #334155; color: var(--text-main); border: none; }
    .modal-btn-cancel:hover { background-color: #475569; }
  </style>
</head>
<body>

  <header>
    <div class="logo">yeahtask.</div>
    <div class="board-controls">
      <select id="board-selector"></select>
      <button onclick="createNewBoard()">+ New Board</button>
      <button class="danger-btn" onclick="deleteCurrentBoard()">Delete Board</button>
    </div>
  </header>

  <div class="board-container" id="board-container">
    <!-- Columns will be injected here -->
  </div>

  <!-- Custom Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 id="modal-title" class="modal-title">Title</h3>
      <p id="modal-message" class="modal-message">Message</p>
      <input type="text" id="modal-input" class="modal-input hidden" autocomplete="off">
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn-cancel">Cancel</button>
        <button id="modal-confirm" class="modal-btn-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // --- Custom Modal System ---
    function showModal(type, title, message = '') {
      return new Promise((resolve) => {
        const overlay = document.getElementById('modal-overlay');
        const titleEl = document.getElementById('modal-title');
        const messageEl = document.getElementById('modal-message');
        const inputEl = document.getElementById('modal-input');
        const cancelBtn = document.getElementById('modal-cancel');
        const confirmBtn = document.getElementById('modal-confirm');

        // Setup text
        titleEl.textContent = title;
        if (message) {
          messageEl.textContent = message;
          messageEl.classList.remove('hidden');
        } else {
          messageEl.classList.add('hidden');
        }

        // Setup elements based on type (alert, confirm, prompt)
        inputEl.value = '';
        if (type === 'prompt') {
          inputEl.classList.remove('hidden');
        } else {
          inputEl.classList.add('hidden');
        }

        if (type === 'alert') {
          cancelBtn.classList.add('hidden');
          confirmBtn.textContent = 'OK';
        } else {
          cancelBtn.classList.remove('hidden');
          confirmBtn.textContent = type === 'confirm' ? 'Yes, Delete' : 'Save';
          
          if(type === 'confirm') {
            confirmBtn.className = 'modal-btn-confirm danger-btn';
          } else {
            confirmBtn.className = 'modal-btn-confirm';
          }
        }

        // Show modal
        overlay.classList.remove('hidden');
        if (type === 'prompt') {
          setTimeout(() => inputEl.focus(), 50); // Focus input after render
        }

        // Handlers
        const cleanup = () => {
          overlay.classList.add('hidden');
          confirmBtn.onclick = null;
          cancelBtn.onclick = null;
          inputEl.onkeydown = null;
        };

        const onConfirm = () => {
          cleanup();
          if (type === 'prompt') {
            resolve(inputEl.value.trim() || null);
          } else {
            resolve(true);
          }
        };

        const onCancel = () => {
          cleanup();
          resolve(type === 'prompt' ? null : false);
        };

        // Attach events
        confirmBtn.onclick = onConfirm;
        cancelBtn.onclick = onCancel;
        
        // Enter key submits prompt
        inputEl.onkeydown = (e) => {
          if (e.key === 'Enter') onConfirm();
        };
      });
    }

    // --- State Management ---
    const STORAGE_KEY = 'yeahtask_data';
    
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      boards: [
        {
          id: 'b_' + Date.now(),
          name: 'My First Board',
          columns: [
            { id: 'c_1', name: 'To Do', tasks: [{ id: 't_1', content: 'Welcome to yeahtask!' }, { id: 't_2', content: 'Try dragging this card to another list.' }] },
            { id: 'c_2', name: 'In Progress', tasks: [] },
            { id: 'c_3', name: 'Done', tasks: [] }
          ]
        }
      ],
      activeBoardId: null
    };

    if (!appData.activeBoardId && appData.boards.length > 0) {
      appData.activeBoardId = appData.boards[0].id;
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    // --- Core Logic ---
    function getActiveBoard() {
      return appData.boards.find(b => b.id === appData.activeBoardId) || appData.boards[0];
    }

    function generateId(prefix) {
      return prefix + '_' + Math.random().toString(36).substr(2, 9);
    }

    // --- Rendering ---
    function render() {
      renderBoardSelector();
      renderBoard();
    }

    function renderBoardSelector() {
      const selector = document.getElementById('board-selector');
      selector.innerHTML = '';
      
      appData.boards.forEach(board => {
        const option = document.createElement('option');
        option.value = board.id;
        option.textContent = board.name;
        if (board.id === appData.activeBoardId) option.selected = true;
        selector.appendChild(option);
      });

      selector.onchange = (e) => {
        appData.activeBoardId = e.target.value;
        saveData();
        render();
      };
    }

    function renderBoard() {
      const container = document.getElementById('board-container');
      container.innerHTML = '';
      
      const activeBoard = getActiveBoard();
      if (!activeBoard) return;

      activeBoard.columns.forEach(column => {
        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.dataset.columnId = column.id;

        // Header
        const header = document.createElement('div');
        header.className = 'column-header';
        header.innerHTML = `
          <span>${column.name}</span>
          <span class="delete-col" onclick="deleteColumn('${column.id}')" title="Delete list">&#x2715;</span>
        `;
        
        // Task List
        const taskList = document.createElement('div');
        taskList.className = 'task-list';
        taskList.dataset.columnId = column.id;
        
        // Drag over events for the list
        taskList.addEventListener('dragover', handleDragOver);
        taskList.addEventListener('drop', handleDrop);

        column.tasks.forEach(task => {
          const taskEl = createTaskElement(task, column.id);
          taskList.appendChild(taskEl);
        });

        // Add Task Button
        const addBtn = document.createElement('div');
        addBtn.className = 'add-task-btn';
        addBtn.innerHTML = `<span>+</span> Add a card`;
        addBtn.onclick = () => createNewTask(column.id);

        colEl.appendChild(header);
        colEl.appendChild(taskList);
        colEl.appendChild(addBtn);
        container.appendChild(colEl);
      });

      // Add Column Button
      const addColBtn = document.createElement('div');
      addColBtn.className = 'add-column-btn';
      addColBtn.textContent = '+ Add another list';
      addColBtn.onclick = createNewColumn;
      container.appendChild(addColBtn);
    }

    function createTaskElement(task, columnId) {
      const taskEl = document.createElement('div');
      taskEl.className = 'task-card';
      taskEl.draggable = true;
      taskEl.dataset.taskId = task.id;
      taskEl.dataset.columnId = columnId;

      taskEl.innerHTML = `
        <span>${task.content}</span>
        <span class="delete-task" onclick="deleteTask('${columnId}', '${task.id}')" title="Delete card">&#x2715;</span>
      `;

      taskEl.addEventListener('dragstart', (e) => {
        setTimeout(() => taskEl.classList.add('dragging'), 0);
        e.dataTransfer.setData('text/plain', JSON.stringify({ taskId: task.id, sourceColId: columnId }));
      });

      taskEl.addEventListener('dragend', () => {
        taskEl.classList.remove('dragging');
      });

      return taskEl;
    }

    // --- Actions ---
    async function createNewBoard() {
      const name = await showModal('prompt', 'Create New Board', 'Enter board name:');
      if (!name) return;

      const newBoard = {
        id: generateId('b'),
        name: name,
        columns: [
          { id: generateId('c'), name: 'To Do', tasks: [] },
          { id: generateId('c'), name: 'Done', tasks: [] }
        ]
      };

      appData.boards.push(newBoard);
      appData.activeBoardId = newBoard.id;
      saveData();
      render();
    }

    async function deleteCurrentBoard() {
      if (appData.boards.length <= 1) {
        await showModal('alert', 'Cannot Delete', "You can't delete your only board!");
        return;
      }
      
      const isConfirmed = await showModal('confirm', 'Delete Board?', `Are you sure you want to delete "${getActiveBoard().name}"?`);
      if (isConfirmed) {
        appData.boards = appData.boards.filter(b => b.id !== appData.activeBoardId);
        appData.activeBoardId = appData.boards[0].id;
        saveData();
        render();
      }
    }

    async function createNewColumn() {
      const name = await showModal('prompt', 'Add List', 'Enter list title:');
      if (!name) return;

      const board = getActiveBoard();
      board.columns.push({
        id: generateId('c'),
        name: name,
        tasks: []
      });
      saveData();
      render();
    }

    async function deleteColumn(columnId) {
      const board = getActiveBoard();
      const colName = board.columns.find(c => c.id === columnId)?.name || 'this list';
      
      const isConfirmed = await showModal('confirm', 'Delete List?', `Delete the "${colName}" list and all its cards?`);
      if(isConfirmed) {
        board.columns = board.columns.filter(c => c.id !== columnId);
        saveData();
        render();
      }
    }

    async function createNewTask(columnId) {
      const content = await showModal('prompt', 'Add Card', 'Enter task details:');
      if (!content) return;

      const board = getActiveBoard();
      const column = board.columns.find(c => c.id === columnId);
      
      column.tasks.push({
        id: generateId('t'),
        content: content
      });
      
      saveData();
      render();
    }

    async function deleteTask(columnId, taskId) {
      const isConfirmed = await showModal('confirm', 'Delete Card?', 'Are you sure you want to delete this card?');
      if(isConfirmed) {
        const board = getActiveBoard();
        const column = board.columns.find(c => c.id === columnId);
        column.tasks = column.tasks.filter(t => t.id !== taskId);
        saveData();
        render();
      }
    }

    // --- Drag and Drop Logic ---
    function handleDragOver(e) {
      e.preventDefault();
      const taskList = e.currentTarget;
      const draggingElement = document.querySelector('.dragging');
      if (!draggingElement) return;

      const afterElement = getDragAfterElement(taskList, e.clientY);
      if (afterElement == null) {
        taskList.appendChild(draggingElement);
      } else {
        taskList.insertBefore(draggingElement, afterElement);
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      const taskList = e.currentTarget;
      const targetColId = taskList.dataset.columnId;
      
      const data = JSON.parse(e.dataTransfer.getData('text/plain'));
      const { taskId, sourceColId } = data;

      if (sourceColId === targetColId) {
        reorderDataModel(targetColId);
      } else {
        moveTaskData(sourceColId, targetColId, taskId);
        reorderDataModel(targetColId);
      }
    }

    function moveTaskData(sourceColId, targetColId, taskId) {
      const board = getActiveBoard();
      const sourceCol = board.columns.find(c => c.id === sourceColId);
      const targetCol = board.columns.find(c => c.id === targetColId);
      
      const taskIndex = sourceCol.tasks.findIndex(t => t.id === taskId);
      const [task] = sourceCol.tasks.splice(taskIndex, 1);
      
      targetCol.tasks.push(task);
    }

    function reorderDataModel(columnId) {
      const board = getActiveBoard();
      const column = board.columns.find(c => c.id === columnId);
      const taskListDOM = document.querySelector(`.task-list[data-column-id="${columnId}"]`);
      
      const newTaskOrder = [];
      const taskElements = taskListDOM.querySelectorAll('.task-card');
      
      taskElements.forEach(el => {
        const tId = el.dataset.taskId;
        const task = column.tasks.find(t => t.id === tId);
        if(task) newTaskOrder.push(task);
      });

      column.tasks = newTaskOrder;
      saveData();
      render();
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];

      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // Initialize
    render();

    // --- Service Worker Registration for PWA ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registration successful:', registration.scope);
          })
          .catch((err) => {
            console.log('ServiceWorker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
